# ============================================
# GitHub Actions — CI/CD ArtHub
# ============================================
# Déclenché sur chaque push sur la branche main.
#
# Étapes :
#   1. Build image Docker API  → push sur ghcr.io
#   2. Build image Docker Frontend → push sur ghcr.io
#   3. SSH sur le VPS → pull images → restart → migrations
# ============================================

name: Deploy ArtHub

on:
  push:
    branches: [main]

jobs:

  # --------------------------------------------------
  # JOB UNIQUE : Déploiement sur le VPS OVH
  # Build directement sur le VPS (pas de registry)
  # --------------------------------------------------
  deploy:
    name: Deploy sur VPS
    runs-on: ubuntu-latest

    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Mise à jour du dépôt ==="
            cd /opt/arthub
            git pull origin main

            echo "=== Build et redémarrage des conteneurs ==="
            docker compose up -d --build --remove-orphans

            echo "=== Migrations base de données ==="
            sleep 5
            docker compose exec -T api php bin/console doctrine:migrations:migrate --env=prod --no-interaction

            echo "=== Nettoyage des anciennes images ==="
            docker image prune -f

            echo "=== Déploiement terminé ==="
