# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    App\:
        resource: '../src/'    
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\EventListener\JWTLoginSuccessListener:
        arguments:
            $loginIpLimiter: '@limiter.login_ip'
            $loginIpUsernameLimiter: '@limiter.login_ip_username'
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success }    
    App\EventListener\JWTLoginFailureListener:
        arguments:
            $loginIpLimiter: '@limiter.login_ip'
            $loginIpUsernameLimiter: '@limiter.login_ip_username'
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_failure }  
    App\State\GalleryCollectionViewsProvider:
        decorates: 'api_platform.doctrine.orm.state.collection_provider'
        autowire: false
        arguments:
            $decorated: '@App\State\GalleryCollectionViewsProvider.inner'
            $viewsRepo: '@App\Repository\GalleryDailyViewRepository'
    App\State\GalleryViewsItemDecorator:
        decorates: 'api_platform.doctrine.orm.state.item_provider'
        autowire: false
        arguments:
            $decorated: '@App\State\GalleryViewsItemDecorator.inner'
            $viewsRepo: '@App\Repository\GalleryDailyViewRepository' 
    App\State\ArtworkViewsCollectionDecorator:
        decorates: 'api_platform.doctrine.orm.state.collection_provider'
        autowire: false
        arguments:
            $decorated: '@App\State\ArtworkViewsCollectionDecorator.inner'
            $viewsRepo: '@App\Repository\ArtworkDailyViewRepository'
    App\State\ArtworkViewsItemDecorator:
        decorates: 'api_platform.doctrine.orm.state.item_provider'
        autowire: false
        arguments:
            $decorated: '@App\State\ArtworkViewsItemDecorator.inner'
            $viewsRepo: '@App\Repository\ArtworkDailyViewRepository'                   
    App\Security\IpHasher:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Controller\Auth\RegisterController:
        arguments:
            $registerIpLimiter: '@limiter.register_ip'

    App\Controller\Auth\EmailController:
        arguments:
            $forgotPasswordIpLimiter: '@limiter.forgot_password_ip'

    App\Service\TranslationService:
        arguments:
            $libreTranslateUrl: '%env(LIBRETRANSLATE_URL)%'
            $libreTranslateApiKey: '%env(default::LIBRETRANSLATE_API_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
