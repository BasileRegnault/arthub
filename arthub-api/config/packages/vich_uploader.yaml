vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        artwork_image:
            uri_prefix: /uploads/artworks
            upload_destination: '%kernel.project_dir%/public/uploads/artworks'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_update: true
            delete_on_remove: true

