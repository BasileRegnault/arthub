# ============================================
# Nginx — Reverse proxy pour ArtHub (Docker)
# ============================================

upstream php-fpm {
    server api:9000;
}

upstream angular {
    server frontend:80;
}

# --- Redirection HTTP → HTTPS ---
server {
    listen 80;
    server_name arthubb.fr www.arthubb.fr api.arthubb.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Frontend (arthubb.fr) ---
server {
    listen 443 ssl;
    server_name arthubb.fr www.arthubb.fr;

    ssl_certificate /etc/letsencrypt/live/arthubb.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arthubb.fr/privkey.pem;

    location / {
        proxy_pass http://angular;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- API (api.arthubb.fr) ---
server {
    listen 443 ssl;
    server_name api.arthubb.fr;

    ssl_certificate /etc/letsencrypt/live/api.arthubb.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.arthubb.fr/privkey.pem;

    root /var/www/api/public;
    client_max_body_size 12M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /uploads/ {
        alias /var/www/api/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /app/public;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
