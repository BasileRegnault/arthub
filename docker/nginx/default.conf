# ============================================
# Nginx — Reverse proxy pour ArtHub (Docker)
# ============================================
# Gère à la fois le frontend (Angular) et l'API (Symfony/PHP-FPM)

# --- Upstream vers les conteneurs ---
upstream php-fpm {
    server api:9000;
}

upstream angular {
    server frontend:80;
}

# --- Redirection HTTP → HTTPS (activer après Certbot) ---
