# --- Frontend (arthub.fr) ---
server {
    listen 80;
    # listen 443 ssl;   # Activer après Certbot
    server_name arthub.fr www.arthub.fr localhost;

    # SSL (activer après Certbot)
    # ssl_certificate /etc/letsencrypt/live/arthub.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/arthub.fr/privkey.pem;

    # Challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://angular;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- API (api.arthub.fr) ---
server {
    listen 80;
    # listen 443 ssl;   # Activer après Certbot
    server_name api.arthub.fr;

    # SSL (activer après Certbot)
    # ssl_certificate /etc/letsencrypt/live/api.arthub.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.arthub.fr/privkey.pem;

    root /var/www/api/public;
    client_max_body_size 12M;

    # Challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Fichiers uploadés (images)
    location /uploads/ {
        alias /var/www/api/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Toutes les requêtes passent par PHP-FPM
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php-fpm;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /app/public;

        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
