<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40">
  <div class="bg-white rounded-xl shadow-lg max-w-md w-full p-6 animate-fade-in">
    
    <!-- En-tete -->
    <h3 class="text-lg font-semibold text-gray-800 mb-4">{{ title }}</h3>
    
    <!-- Contenu -->
    <p class="text-gray-600 mb-6">
      Voulez-vous vraiment supprimer <span class="font-semibold">{{ itemTitle }}</span> ?
    </p>
    
    <!-- Boutons d'action -->
    <div class="flex justify-end gap-3">
      <button
        class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50 transition"
        (click)="cancel()">
        Annuler
      </button>
      <button
        class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition"
        (click)="confirm()">
        Confirmer
      </button>
    </div>
  </div>
</div>
