<a
  [routerLink]="['/galleries', gallery().id]"
  class="block bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden group relative">

  <!-- Image de couverture -->
  <div class="relative aspect-video overflow-hidden bg-gray-100">
    <img
      [src]="coverImageUrl()"
      [alt]="gallery().name"
      class="w-full h-full object-cover group-hover:scale-105 transition duration-300">

    <!-- Badge de visibilite -->
    <div class="absolute top-3 left-3">
      @if (gallery().isPublic) {
        <span class="inline-flex items-center gap-1 px-3 py-1 bg-green-500/90 backdrop-blur-sm text-white text-xs font-semibold rounded-full">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
          </svg>
          Publique
        </span>
      } @else {
        <span class="inline-flex items-center gap-1 px-3 py-1 bg-gray-700/90 backdrop-blur-sm text-white text-xs font-semibold rounded-full">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
          </svg>
          Privée
        </span>
      }
    </div>

    <!-- Nombre d'oeuvres -->
    <div class="absolute bottom-3 right-3 bg-white/95 backdrop-blur-sm rounded-lg px-3 py-1 shadow-md">
      <span class="text-sm font-semibold text-gray-900">{{ artworksCount() }} œuvres</span>
    </div>
  </div>

  <!-- Contenu -->
  <div class="p-5">
    <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-1 group-hover:text-blue-600 transition">
      {{ gallery().name }}
    </h3>

    @if (gallery().description) {
      <p class="text-sm text-gray-600 line-clamp-2 mb-4">
        {{ gallery().description }}
      </p>
    }

    <!-- Actions (si activees) -->
    @if (showActions()) {
      <div class="flex gap-2 pt-4 border-t border-gray-100">
        <button
          (click)="onEdit($event)"
          class="flex-1 px-3 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
          Modifier
        </button>
        <button
          (click)="onToggleVisibility($event)"
          class="px-3 py-2 text-sm border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition"
          [title]="gallery().isPublic ? 'Rendre privée' : 'Rendre publique'">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (gallery().isPublic) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            }
          </svg>
        </button>
        <button
          (click)="onDelete($event)"
          class="px-3 py-2 text-sm border border-red-600 text-red-600 rounded-lg hover:bg-red-50 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    }
  </div>
</a>
