<div class="fixed inset-0 z-50 flex items-center justify-center" *ngIf="open">
  <div class="absolute inset-0 bg-black/40" (click)="cancel()"></div>

  <div class="relative bg-white w-full max-w-lg mx-4 rounded-xl shadow-lg p-6">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-lg font-semibold text-gray-800">{{ title }}</h3>
        <p class="text-sm text-gray-500 mt-1" *ngIf="subtitle">{{ subtitle }}</p>
      </div>

      <button
        class="w-9 h-9 rounded-full hover:bg-gray-100 flex items-center justify-center"
        (click)="cancel()"
        aria-label="Close"
      >
        ✕
      </button>
    </div>

    <div class="mt-4">
      <label class="text-sm font-medium text-gray-700 block mb-2">
        Message (optionnel)
      </label>

      <textarea
        class="w-full min-h-[110px] border border-gray-300 rounded-lg p-3 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500"
        [placeholder]="placeholder"
        [(ngModel)]="reason"
      ></textarea>

      <div class="text-xs text-gray-400 mt-2">
        {{ reason.length }} / {{ maxLength }}
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <button
        class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 transition"
        (click)="cancel()"
      >
        Annuler
      </button>

      <button
        class="px-4 py-2 rounded-lg text-white transition disabled:opacity-50"
        [ngClass]="confirmClass"
        [disabled]="loading"
        (click)="confirm()"
      >
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
