<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="bg-white p-8 rounded-xl shadow w-full max-w-md space-y-4"
  >
    <h1 class="text-2xl font-bold text-center">Nouveau mot de passe</h1>

    <input
      type="password"
      formControlName="password"
      placeholder="Nouveau mot de passe"
      class="w-full px-4 py-2 border rounded"
    />

    <p *ngIf="error" class="text-red-500 text-sm text-center">
      {{ error }}
    </p>

    <button
      type="submit"
      class="w-full bg-black text-white py-2 rounded"
    >
      Modifier le mot de passe
    </button>
  </form>
</div>
