<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <form
    [formGroup]="form"
    class="bg-white p-8 rounded-xl shadow w-full max-w-md space-y-4"
    (ngSubmit)="submit()"
  >

    <!-- 🔙 Bouton retour -->
    <app-back-button
      label="Retour"
      class="mb-2"
    ></app-back-button>

    <h1 class="text-2xl font-bold text-center">Connexion</h1>

    <input
      type="email"
      placeholder="Email"
      formControlName="email"
      class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500"
    />

    <input
      type="password"
      placeholder="Mot de passe"
      formControlName="password"
      class="w-full px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500"
    />

    <!-- ❌ Erreur -->
    <p *ngIf="error" class="text-red-500 text-sm text-center">
      {{ error }}
    </p>

    <!-- 🔐 Mot de passe oublié -->
    <div class="text-right">
      <a
        routerLink="/auth/forgot-password"
        class="text-sm text-blue-600 hover:underline"
      >
        Mot de passe oublié ?
      </a>
    </div>

    <!-- ✅ Bouton submit -->
    <button
      type="submit"
      [disabled]="loading"
      class="w-full bg-black text-white py-2 rounded hover:bg-gray-800 disabled:opacity-50"
    >
      {{ loading ? 'Patientez...' : 'Se connecter' }}
    </button>

    <!-- 🆕 Register -->
    <p class="text-center text-sm text-gray-600">
      Pas encore de compte ?
      <a
        routerLink="/auth/register"
        [queryParams]="{ returnUrl: returnUrl }"
        class="text-blue-600 hover:underline font-medium"
      >
        Créer un compte
      </a>
    </p>

  </form>
</div>
