<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <form [formGroup]="form" (ngSubmit)="submit()"
    class="bg-white p-8 rounded-xl shadow-md border border-slate-200 w-full max-w-md space-y-5">

    <app-back-button label="Retour" class="mb-2"></app-back-button>

    <h1 class="text-2xl font-bold text-slate-800 text-center">Connexion</h1>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Email</label>
      <input type="email" placeholder="votre@email.com" formControlName="email"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Mot de passe</label>
      <input type="password" placeholder="" formControlName="password"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    @if (error) {
      <p class="text-red-500 text-sm text-center">{{ error }}</p>
    }

    <div class="text-right">
      <a routerLink="/auth/forgot-password" class="text-xs text-slate-500 hover:text-slate-700 transition">
        Mot de passe oublié ?
      </a>
    </div>

    <button type="submit" [disabled]="loading"
      class="w-full bg-slate-800 text-white py-2.5 rounded-lg font-semibold hover:bg-slate-700 transition disabled:opacity-50">
      {{ loading ? 'Patientez...' : 'Se connecter' }}
    </button>

    <p class="text-center text-sm text-slate-500">
      Pas encore de compte ?
      <a routerLink="/auth/register" [queryParams]="{ returnUrl: returnUrl }" class="text-slate-800 hover:underline font-semibold">
        Créer un compte
      </a>
    </p>
  </form>
</div>
