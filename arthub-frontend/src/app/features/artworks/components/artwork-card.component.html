<a
  [routerLink]="['/artworks', slugId()]"
  class="block bg-white rounded-xl shadow-md hover:shadow-xl transition overflow-hidden group border border-slate-200 hover:border-slate-300">

  <!-- Image -->
  <div class="relative aspect-square overflow-hidden bg-slate-100">
    <img
      [src]="imageUrl()"
      [alt]="artwork().title"
      class="w-full h-full object-cover group-hover:scale-105 transition duration-300">

    <!-- TypeBadge -->
    @if (artwork().type) {
      <div class="absolute top-3 left-3 bg-slate-800/90 backdrop-blur-sm rounded-lg px-3 py-1 shadow-md">
        <span class="text-sm font-medium text-white">{{ artwork().type }}</span>
      </div>
    }
  </div>

  <!-- Contenu -->
  <div class="p-4">
    <h3 class="text-lg font-bold text-gray-900 mb-1 line-clamp-1 group-hover:text-slate-600 transition">
      {{ artwork().title }}
    </h3>

    <div class="flex items-center justify-between text-sm text-gray-600">
      <span>{{ artwork().style || 'Art' }}</span>
      @if (artwork().creationDate) {
        <span class="font-medium">{{ artwork().creationDate | date:'yyyy' }}</span>
      }
    </div>

    <!-- Avis -->
    @if (ratingsCount() > 0) {
      <div class="mt-3 flex items-center gap-2">
        <app-star-rating
          [rating]="averageRating()"
          [readonly]="true"
          [size]="'sm'" />
        <span class="text-xs text-gray-500">{{ ratingsCount() }} avis</span>
      </div>
    } @else {
      <div class="mt-1">
        <span class="text-xs text-gray-500">Aucun avis</span>
      </div>
    }
  </div>
</a>
