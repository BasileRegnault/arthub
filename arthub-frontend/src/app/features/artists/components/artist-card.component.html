<div
  (click)="navigateToArtist(artist().id)"
  class="group bg-white rounded-3xl shadow-lg hover:shadow-xl transition-all duration-300 cursor-pointer overflow-hidden border-2 border-slate-200 hover:border-slate-400 transform hover:scale-105">
    <div class="h-52 bg-slate-200 relative overflow-hidden">
      @if (getArtistTopArtworkUrl(artist())) {
        <img
          [src]="getArtistTopArtworkUrl(artist())"
          [alt]="'Oeuvre de ' + artist().firstname + ' ' + artist().lastname"
          class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
        <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
      } @else {
        <div class="w-full h-full bg-gradient-to-r from-slate-700 to-slate-500"></div>
      }
      <div class="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-all duration-300"></div>
      </div>
        <div class="relative px-8 pb-8">
          <div class="absolute -top-14 left-8">
            <img
              [src]="getArtistImageUrl(artist())"
              [alt]="artist().firstname + ' ' + artist().lastname"
              class="w-28 h-28 rounded-2xl border-4 border-white object-cover shadow-lg">
          </div>
          <div class="pt-16">
            <h3 class="text-2xl font-bold text-gray-900 mb-2 group-hover:text-slate-600 transition-colors">
              {{ artist().firstname }} {{ artist().lastname }}
            </h3>
            <p class="text-slate-600 text-sm font-semibold mb-3 uppercase tracking-wide">{{ artist().nationality || 'Artiste' }}</p>
            @if (artist().biography) {
              <p class="text-gray-700 leading-relaxed line-clamp-2">
                {{ artist().biography }}
              </p>
            }
          </div>
        </div>
</div>
