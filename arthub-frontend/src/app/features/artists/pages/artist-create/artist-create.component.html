<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <app-back-button label="Retour aux artistes" route="/artists" />

    <div class="bg-white rounded-xl shadow-md p-8 mb-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Créer un Nouvel Artiste</h1>
      <p class="text-gray-600">Ajoutez un artiste à la base de données</p>
    </div>

    <app-global-error-alert [error]="globalError()" (dismiss)="globalError.set(null)" />

    @if (duplicateError()) {
      <div class="flex items-start gap-3 p-4 bg-red-50 border border-red-200 rounded-xl">
        <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-sm text-red-800">{{ duplicateError() }}</p>
      </div>
    }

    <form (ngSubmit)="submit()" [formGroup]="form" class="bg-white rounded-xl shadow-md p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-form-field label="Prénom" [control]="form.controls.firstname" placeholder="Prénom de l'artiste" />
        <app-form-field label="Nom" [control]="form.controls.lastname" placeholder="Nom de l'artiste" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Nationalité</label>
        <app-country-autocomplete placeholder="Rechercher un pays..." formControlName="nationality" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <app-form-field label="Date de naissance" type="date" [control]="form.controls.bornAt" placeholder="YYYY-MM-DD" />
        <app-form-field label="Date de décès (optionnel)" type="date" [control]="form.controls.diedAt" placeholder="YYYY-MM-DD" />
      </div>

      <app-form-field label="Biographie" type="textarea" [control]="form.controls.biography" placeholder="Biographie de l'artiste..." />

      <div class="flex flex-col gap-1.5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Photo de profil (optionnel)</label>
        <app-file-upload [file]="fileSignal()" (fileChange)="fileSignal.set($event)" />
      </div>

      @if (isAdmin) {
        <div class="flex items-start gap-3 p-4 bg-amber-50 border border-amber-200 rounded-lg">
          <svg class="w-5 h-5 text-amber-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-sm text-amber-800">
            <span class="font-semibold">Mode administrateur</span> — Cet artiste sera publié immédiatement sans passer par la validation.
          </p>
        </div>
      }

      <div class="flex items-center justify-between pt-6 border-t border-gray-200">
        <button
          type="submit"
          [disabled]="submitting()"
          class="px-8 py-3 bg-slate-800 text-white rounded-lg font-semibold hover:bg-slate-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
          {{ submitting() ? 'Création en cours...' : 'Créer l\'Artiste' }}
        </button>
        @if (submitting()) {
          <div class="text-gray-500 text-sm">Envoi en cours...</div>
        }
      </div>
    </form>
  </div>
</div>
