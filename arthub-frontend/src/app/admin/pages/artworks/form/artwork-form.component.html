<div class="max-w-3xl mx-auto bg-white p-8 shadow-lg rounded-xl border border-gray-100">
  <app-back-button label="Retour"></app-back-button>

  <h2 class="text-3xl font-semibold mb-6 text-gray-800">
    {{ isEdit ? 'Modifier une œuvre' : 'Créer une nouvelle œuvre' }}
  </h2>

  <app-global-error-alert [error]="globalError()" (dismiss)="globalError.set(null)"></app-global-error-alert>

  <form (ngSubmit)="submit()" [formGroup]="form" class="space-y-6">
    <app-form-field label="Titre" [control]="form.controls.title" placeholder="Entrez le titre de l'œuvre" />

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Type</label>
        <select formControlName="type"
          class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition">
          <option value="">Sélectionnez un type</option>
          @for (opt of typeOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Style</label>
        <select formControlName="style"
          class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition">
          <option value="">Sélectionnez un style</option>
          @for (opt of styleOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
    </div>

    <app-form-field label="Date de création" type="date" [control]="form.controls.creationDate" placeholder="Sélectionnez une date" />

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Artiste</label>
      <app-artist-autocomplete formControlName="artist" />
    </div>

    <app-form-field label="Description" type="textarea" [control]="form.controls.description" placeholder="Écrivez une description..." />

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Image</label>
      <app-file-upload [file]="fileSignal()" [initialPreview]="previewUrl()" (fileChange)="fileSignal.set($event)" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Localisation</label>
      <app-country-autocomplete placeholder="Rechercher un pays..." formControlName="location" />
    </div>

    <app-form-field label="Afficher cette œuvre" type="toggle" [control]="form.controls.isDisplay" />

    <div class="flex items-center justify-between mt-6">
      <div class="flex gap-3">
        <button type="submit"
          class="px-5 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg shadow-sm transition">
          {{ isEdit ? 'Mettre à jour' : 'Créer' }}
        </button>
        @if (isEdit) {
          <button type="button" (click)="onDelete()"
            class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-sm transition">
            Supprimer
          </button>
        }
      </div>
      @if (submitting()) {
        <div class="text-gray-500">Envoi en cours...</div>
      }
    </div>
  </form>
</div>

<app-confirm-modal
  [isOpen]="confirmModalOpen()"
  title="Supprimer l'œuvre"
  [itemTitle]="selectedArtworkTitle"
  (onConfirm)="handleConfirmDelete()"
  (onCancel)="handleCancelDelete()">
</app-confirm-modal>

<app-related-entities-modal
  [isOpen]="relatedEntitiesModalOpen"
  [title]="relatedEntitiesTitle"
  [message]="relatedEntitiesMessage"
  [relatedData]="relatedEntitiesData"
  (onClose)="closeRelatedEntitiesModal()">
</app-related-entities-modal>
