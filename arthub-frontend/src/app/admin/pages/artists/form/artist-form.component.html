<div class="max-w-3xl mx-auto bg-white p-8 shadow-lg rounded-xl border border-gray-100">
  <app-back-button label="Retour"></app-back-button>

  <h2 class="text-3xl font-semibold mb-6 text-gray-800">
    {{ isEdit ? 'Modifier un artiste' : 'Créer un artiste' }}
  </h2>

  <app-global-error-alert [error]="globalError()" (dismiss)="globalError.set(null)"></app-global-error-alert>

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <app-form-field label="Prénom" [control]="form.controls.firstname" placeholder="Prénom de l'artiste" />
      <app-form-field label="Nom" [control]="form.controls.lastname" placeholder="Nom de l'artiste" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Nationalité</label>
      <app-country-autocomplete placeholder="Rechercher un pays..." formControlName="nationality" />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <app-form-field label="Date de naissance" type="date" [control]="form.controls.bornAt" />
      <app-form-field label="Date de décès" type="date" [control]="form.controls.diedAt" />
    </div>

    <app-form-field label="Biographie" type="textarea" [control]="form.controls.biography" placeholder="Biographie de l'artiste" />

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Photo de profil</label>
      <app-file-upload [file]="fileSignal()" [initialPreview]="previewUrl()" (fileChange)="onPreviewUpdate($event)" />
    </div>

    <div class="flex items-center justify-between pt-6">
      <div class="flex gap-3">
        <button type="submit" [disabled]="submitting()"
          class="px-5 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg shadow-sm transition disabled:opacity-50">
          {{ isEdit ? 'Mettre à jour' : 'Créer' }}
        </button>
        @if (isEdit) {
          <button type="button" (click)="onDelete()"
            class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-sm transition">
            Supprimer
          </button>
        }
      </div>
      @if (submitting()) {
        <div class="text-gray-500">Envoi en cours…</div>
      }
    </div>
  </form>
</div>

<app-confirm-modal
  [isOpen]="confirmModalOpen()"
  title="Supprimer l'artiste"
  [itemTitle]="selectedArtistName"
  (onConfirm)="handleConfirmDelete()"
  (onCancel)="handleCancelDelete()">
</app-confirm-modal>

<app-related-entities-modal
  [isOpen]="relatedEntitiesModalOpen"
  [title]="relatedEntitiesTitle"
  [message]="relatedEntitiesMessage"
  [relatedData]="relatedEntitiesData"
  (onClose)="closeRelatedEntitiesModal()">
</app-related-entities-modal>
