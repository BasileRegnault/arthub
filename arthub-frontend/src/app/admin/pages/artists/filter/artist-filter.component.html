<div class="bg-white border border-slate-200 rounded-xl shadow-sm p-4 md:p-6 space-y-4">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide">Filtres</h3>
    <span class="text-xs text-slate-400 hidden md:inline">Recherche avancée</span>
  </div>

  <form [formGroup]="form" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Prénom</label>
      <input type="text" formControlName="firstname" placeholder="Prénom"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Nom</label>
      <input type="text" formControlName="lastname" placeholder="Nom"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Nationalité</label>
      <input type="text" formControlName="nationality" placeholder="Nationalité"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Créé par</label>
      <app-user-autocomplete formControlName="createdBy"></app-user-autocomplete>
    </div>

    <app-date-range-input label="Né(e) entre" [formGroup]="form" afterControl="bornAtAfter" beforeControl="bornAtBefore" />
    <app-date-range-input label="Décédé(e) entre" [formGroup]="form" afterControl="diedAtAfter" beforeControl="diedAtBefore" />
    <app-date-range-input label="Créé entre" [formGroup]="form" afterControl="createdAtAfter" beforeControl="createdAtBefore" />
    <app-date-range-input label="Modifié entre" [formGroup]="form" afterControl="updatedAtAfter" beforeControl="updatedAtBefore" />

    <div class="md:col-span-4">
      <app-boolean-toggle
        label="Validation"
        [value]="form.value.isConfirmCreate!"
        trueLabel="Confirmé"
        falseLabel="Non confirmé"
        (valueChange)="setIsConfirmCreate($event)" />
    </div>
  </form>

  <div class="flex justify-end gap-3 pt-3 border-t border-slate-100">
    <button type="button" (click)="resetFilters()"
      class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition text-sm">
      Réinitialiser
    </button>
    <button type="button" (click)="submit()"
      class="px-5 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-700 transition text-sm">
      Rechercher
    </button>
  </div>
</div>
