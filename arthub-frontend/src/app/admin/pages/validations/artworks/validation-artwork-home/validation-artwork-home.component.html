<div class="space-y-6">

  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-semibold text-gray-800">Validation des oeuvres</h2>
  </div>

  <!-- Tabs -->
  <div class="border-b flex gap-6">
    @for (tab of tabs; track tab.key) {
      <button
        (click)="setTab(tab.key)"
        class="pb-2 text-sm font-medium transition"
        [ngClass]="activeTab === tab.key
          ? 'border-b-2 border-blue-600 text-blue-600'
          : 'text-gray-500 hover:text-gray-700'">
        {{ tab.label }}
      </button>
    }
  </div>

  <!-- Contenu -->
  @if (activeTab === 'pending') {
    <div>
      <app-validation-artwork-list></app-validation-artwork-list>
    </div>
  }

  @if (activeTab === 'history') {
    <div>
      <app-validation-artwork-history></app-validation-artwork-history>
    </div>
  }

</div>
