<div class="bg-white border border-slate-200 rounded-xl shadow-sm p-4 md:p-6 space-y-4">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wide">Filtres</h3>
    <span class="text-xs text-slate-400 hidden md:inline">Recherche avancée</span>
  </div>

  <form [formGroup]="form" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Nom d'utilisateur</label>
      <input type="text" formControlName="username" placeholder="Nom d'utilisateur"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Email</label>
      <input type="email" formControlName="email" placeholder="Email"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">Rôle</label>
      <select formControlName="role"
        class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition">
        <option value="">Tous</option>
        @for (r of roles; track r) {
          <option [value]="r">{{ r }}</option>
        }
      </select>
    </div>

    <app-date-range-input label="Créé entre" [formGroup]="form" afterControl="createdAtAfter" beforeControl="createdAtBefore" />

    <div class="flex items-center gap-2 md:col-span-4 mt-2">
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Suspension :</span>
      <div class="flex rounded-lg border border-slate-200 overflow-hidden shadow-sm text-sm">
        <button type="button"
          class="px-4 py-2 transition"
          [class.bg-slate-100]="form.value.isSuspended === ''"
          [class.text-slate-700]="form.value.isSuspended === ''"
          (click)="setIsSuspended('')">Tous</button>
        <button type="button"
          class="px-4 py-2 border-l border-slate-200 transition"
          [class.bg-green-500]="form.value.isSuspended === false"
          [class.text-white]="form.value.isSuspended === false"
          (click)="setIsSuspended(false)">Actif</button>
        <button type="button"
          class="px-4 py-2 border-l border-slate-200 transition"
          [class.bg-red-500]="form.value.isSuspended === true"
          [class.text-white]="form.value.isSuspended === true"
          (click)="setIsSuspended(true)">Suspendu</button>
      </div>
    </div>
  </form>

  <div class="flex justify-end gap-3 pt-3 border-t border-slate-100">
    <button type="button" (click)="resetFilters()"
      class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 transition text-sm">
      Réinitialiser
    </button>
    <button type="button" (click)="submit()"
      class="px-5 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-700 transition text-sm">
      Rechercher
    </button>
  </div>
</div>
